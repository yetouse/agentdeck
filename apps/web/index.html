<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time web cockpit for supervising AI coding agents" />
    <title>AgentDeck</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar__brand">
          <svg class="topbar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="6" height="6" rx="1.2" fill="#6366f1"/>
            <rect x="9" y="1" width="6" height="6" rx="1.2" fill="#10b981"/>
            <rect x="1" y="9" width="6" height="6" rx="1.2" fill="#f59e0b"/>
            <rect x="9" y="9" width="6" height="6" rx="1.2" fill="#6366f1" opacity="0.35"/>
          </svg>
          <span class="topbar__name">AgentDeck</span>
          <span id="agentdeck-version" class="topbar__version">v0.2.0</span>
        </div>
        <div class="topbar__right">
          <label class="language-switch" for="language-switch">
            <span id="language-switch-label">Langue</span>
            <select id="language-switch" aria-labelledby="language-switch-label">
              <option value="fr">Français</option>
              <option value="en">English</option>
            </select>
          </label>
          <div id="status-bar" class="topbar__statusbar"></div>
        </div>
      </header>

      <div class="command-center">
        <div class="command-center__left">
          <span id="hero-eyebrow" class="command-center__eyebrow">Cockpit local d’opérations IA</span>
          <h1 id="hero-title" class="command-center__title">Supervision des agents</h1>
          <p id="hero-subtitle" class="command-center__subtitle">Surveiller, orienter et coordonner les agents de code IA en temps réel</p>
        </div>
        <div class="command-center__metrics">
          <div class="cc-metric cc-metric--running">
            <span id="hero-active" class="cc-metric__value">0</span>
            <span id="hero-active-label" class="cc-metric__label">Actifs</span>
          </div>
          <div class="cc-metric">
            <span id="hero-system" class="cc-metric__value">0</span>
            <span id="hero-system-label" class="cc-metric__label">Système</span>
          </div>
          <div class="cc-metric">
            <span id="hero-signals" class="cc-metric__value">0</span>
            <span id="hero-signals-label" class="cc-metric__label">Signaux</span>
          </div>
        </div>
      </div>

      <main class="cockpit">
        <section class="cockpit__panel" id="panel-agents">
          <div class="panel__header">
            <h2 class="panel__title">
              <span id="agents-panel-title">Agents</span>
              <span id="agent-count" class="panel__badge">0</span>
            </h2>
            <nav class="dashboard-nav" role="tablist" aria-label="Dashboard view">
              <button id="dashboard-view-now" class="dashboard-nav__btn dashboard-nav__btn--active" type="button" role="tab" aria-selected="true" data-view="now">
                <span data-i18n="nav.now">Maintenant</span><em>0</em>
              </button>
              <button id="dashboard-view-system" class="dashboard-nav__btn" type="button" role="tab" aria-selected="false" data-view="system">
                <span data-i18n="nav.system">Système</span><em>0</em>
              </button>
              <button id="dashboard-view-history" class="dashboard-nav__btn" type="button" role="tab" aria-selected="false" data-view="history">
                <span data-i18n="nav.history">Historique</span><em>0</em>
              </button>
            </nav>
            <span class="stream-indicator"><span class="stream-indicator__dot" aria-hidden="true"></span><span id="stream-indicator-label">écoute</span></span>
          </div>

          <div id="claude-pressure" class="claude-pressure" aria-live="polite"></div>

          <div id="agent-grid" class="agent-grid"></div>

          <div id="activity-now-feed" class="activity-now"></div>
        </section>
      </main>

      <div id="agent-detail-shell" class="agent-detail-shell" aria-hidden="true">
        <button id="agent-detail-backdrop" class="agent-detail-backdrop" type="button" aria-label="Close agent detail"></button>
        <aside id="agent-detail" class="agent-detail" role="dialog" aria-modal="true" aria-labelledby="agent-detail-title">
          <div id="agent-detail-content" class="agent-detail__content"></div>
        </aside>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
